name: Publish to npm

# Publishes @seameet/mcp when a v<version> tag is pushed. Auth is npm "Trusted
# Publishing" (OIDC) — there is NO NPM_TOKEN secret. The trust is configured on
# npmjs.com (package -> Settings -> Trusted Publisher -> owner seameet-ai, repo
# seameet-mcp, workflow publish.yml). Keep this filename in sync with that config.
#
# To release: bump package.json version, commit, then `git tag vX.Y.Z && git push
# --tags`. The tag must match package.json or the job fails fast.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 22 ships npm 10.x.
      - name: Use latest npm
        run: npm install -g npm@latest

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag version: $TAG   package.json: $PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG — bump package.json or fix the tag."
            exit 1
          fi

      - name: Install
        run: npm install

      - name: Test
        run: npm test

      - name: Publish (OIDC trusted publishing + provenance)
        run: npm publish --provenance --access public
